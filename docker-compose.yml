version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: meu_mongo_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      # Aqui você já define o usuário ROOT e a senha na criação
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: G5g56
    volumes:
      # Mapeia os dados do banco para uma pasta local chamada 'mongo_data'
      # Isso garante que se o contêiner cair, seus dados não somem.
      - ./mongo_data:/data/db
